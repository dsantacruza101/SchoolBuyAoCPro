<div class="dashboard">
  <p-card styleClass="dashboard__card">

    <div class="dashboard__greeting">
      <i class="pi pi-home dashboard__greeting-icon"></i>
      <div>
        <h1 class="dashboard__heading">
          Hello, {{ profile()?.displayName ?? 'there' }}
        </h1>
        <p class="dashboard__sub">
          Signed in as <strong>{{ profile()?.email }}</strong>
        </p>
      </div>
    </div>

    <p-divider />

    <div class="dashboard__caps-section">
      <div class="dashboard__caps-title">Your capabilities</div>

      <div class="dashboard__caps-list">
        @for (cap of caps(); track cap) {
          <p-tag [value]="cap" severity="info" styleClass="dashboard__cap-tag" />
        } @empty {
          <p-tag
            value="No capabilities — JWT claims not yet synced"
            severity="warn"
          />
        }
      </div>
    </div>

  </p-card>
</div>
